scrape_vacancies_task:
  description: >
    Today's date is {today}. This kickoff discovers vacancies for one company only.
    Company: {company}
    Career page: {career_page}

    1. Use the "Read a file's content" tool to read only knowledge/search-criteria.md. Use this to understand the target roles, seniority, and keywords.
    2. Use the "Scrape website with Selenium" tool to scrape the provided career_page for this company and identify open job positions (title and URL).
    3. If the provided career_page is unusable for evaluating openings (missing, invalid, inaccessible, or clearly not a careers/jobs page), call "Discovery Coverage Reporter" with:
       - run_date: {today}
       - company: {company}
       - career_page: {career_page}
       - status: "skipped"
       - jobs_found: 0
       - matched_jobs: 0
       - notes: specific reason
       Then return [] immediately.
    4. If scraping fails due to tool error, timeout, HTTP error, or unexpected page failure, call "Discovery Coverage Reporter" with:
       - run_date: {today}
       - company: {company}
       - career_page: {career_page}
       - status: "failed"
       - jobs_found: 0
       - matched_jobs: 0
       - notes: specific reason
       Then return [] immediately.
    5. **FILTERING STEP**: From discovered openings, keep only roles that match the search criteria and skip irrelevant roles.
    6. For each vacancy that passed the filter:
       a. Use "Vacancy Dedup Checker" with the vacancy URL. If result is "duplicate", skip it.
       b. Use the "Scrape website with Selenium" tool to open the job-specific URL and read the page.
          If the role is closed/filled or the page cannot be read, skip it.
       c. Extract: full job description, required skills, any explicit application questions, and whether a cover letter is requested.
       d. Generate vacancy_id as lowercase company and title, spaces/special chars replaced with hyphens, and double-hyphen between company and title.
       e. Use the "Write to a file" tool to save JSON at data/{today}/vacancies/<vacancy_id>.json with:
          {{
            "id": "<vacancy_id>",
            "company": "{company}",
            "title": "<job_title>",
            "url": "<job_url>",
            "description": "<full_job_description>",
            "questions": ["<question1>", "<question2>"],
            "scraped_at": "<ISO8601 timestamp>"
          }}
          Ensure data/{today}/vacancies/ exists before writing. If there are no application questions, use [].
    7. After handling this company successfully, call "Discovery Coverage Reporter" with:
       - run_date: {today}
       - company: {company}
       - career_page: {career_page}
       - status: "completed"
       - jobs_found: total roles discovered before filtering
       - matched_jobs: roles that passed filtering
       - notes: useful summary notes
    8. Return a JSON list of vacancy IDs saved for this company.
  expected_output: >
    A JSON list of vacancy IDs saved for this kickoff's {company}, e.g.
    ["acme-corp--senior-pm", "acme-corp--staff-product-manager"].
    Return an empty list [] if no new vacancies were found or if all were duplicates.
  agent: vacancy_scout

score_vacancies_task:
  description: >
    Today's date is {today}. Score all newly discovered vacancies.

    The previous task (scrape_vacancies_task) returned a list of vacancy IDs (e.g. ["acme-corp--senior-pm"]).
    If the list is empty, stop immediately and return []. Do NOT try to read any files.

    For each vacancy ID in the list, read the file at data/{today}/vacancies/<vacancy_id>.json
    using the "Read a file's content" tool with the exact path.
    Also read knowledge/search-criteria.md and knowledge/profile/profile-summary.md.

    For each vacancy:
      a. Score it 0-100 based on fit with the candidate's profile and search criteria.
         Consider: role title match, seniority, location/remote preference, industry,
         company stage, salary range, excluded criteria from search-criteria.md.
      b. Determine requires_cover_letter: true if the job description explicitly asks
         for one, false otherwise.
      c. Set status to "skipped" if score is clearly below criteria (do not send to Telegram).
         Otherwise set status to "pending_approval".
      d. Use the "Write to a file" tool to save a JSON file to data/{today}/scores/<vacancy_id>.json with this schema:
         {{
           "vacancy_id": "<vacancy_id>",
           "date": "{today}",
           "company": "<company_name>",
           "title": "<job_title>",
           "score": <integer 0-100>,
           "reasoning": "<brief explanation of score>",
           "status": "pending_approval",
           "requires_cover_letter": <true or false>
         }}
         Ensure the directory data/{today}/scores/ exists before writing.
    Return a JSON list of score file paths for vacancies with status "pending_approval".
  expected_output: >
    A JSON list of score file paths for qualifying vacancies, e.g.
    ["data/2026-05-10/scores/acme-corp--senior-pm.json"].
    Return [] if no vacancies qualify.
  agent: fit_analyst
  context:
    - scrape_vacancies_task
