plan_company_sources_task:
  description: >
    Today's date is {today}. Build a concise plan for sourcing companies.

    1. Read knowledge/search-criteria.md to understand role, seniority,
       location, and exclusion constraints.
    2. Read knowledge/profile/profile-summary.md for candidate context.
    3. Use the Company Query Planner tool to generate deterministic query
       variants from role, seniority, and industry combinations.
    4. Produce a practical sourcing plan with target company signals,
       prioritization rules, and output schema expectations.
  expected_output: >
    A concise sourcing plan in markdown with explicit inclusion and exclusion
    criteria for company research.
  agent: source_planner

research_companies_task:
  description: >
    Execute company research using the sourcing plan from the previous task.

    Tooling requirements for this task:
    - Use Public Company Search for discovery queries.
    - Use Career Page Resolver to choose a career URL per company from search results.
    - Use Company Candidate Dedup for dedupe-aware validation during research.
      This task must not write final candidate files; final persisted output remains
      the candidate writer task.

    Deduplication ownership is REQUIRED in this task:
    - Read knowledge/companies.csv and treat every existing company as already known.
    - Read data/*/company_candidates.csv files when available.
    - Skip companies already present in either knowledge/companies.csv or
      data/*/company_candidates.csv before producing output for downstream tasks.

    Return only new, unique companies with enough evidence to evaluate fit.
  expected_output: >
    A markdown table or JSON list of unique, net-new company candidates with
    supporting notes and source context.
  agent: company_researcher
  context:
    - plan_company_sources_task

score_company_fit_task:
  description: >
    Score each researched company against the candidate profile and search
    criteria. Use a transparent 0-100 scale and explain each score briefly.

    For each candidate, provide a short neutral company description suitable
    for Telegram review. Keep this description separate from match_reason:
    description should describe the company neutrally, while match_reason
    should explain profile-fit rationale.

    Mark candidates intended for review as status pending_review.
  expected_output: >
    A ranked list of candidate companies with score, short neutral company
    description, fit reasoning, and status values.
  agent: fit_analyst
  context:
    - research_companies_task

write_company_candidates_task:
  description: >
    Write the final candidate output for today to:
    data/{today}/company_candidates.csv

    You MUST use Company Candidate Writer to persist schema-compatible rows.

    Ensure rows use the company candidate CSV schema:
    - company
    - career_page
    - website
    - description
    - source
    - industry
    - match_score
    - match_reason
    - status
    - discovered_at

    candidate_id is generated by the writer tool/storage layer. Do not invent
    or supply candidate_id manually in the task payload.

    Keep status as pending_review for candidates that should be reviewed.
    If no candidates qualify, still create the CSV file with the schema header
    and no data rows so the flow can distinguish a valid empty run from a write
    failure.
  expected_output: >
    Path to the generated company_candidates.csv file for today's run.
  agent: candidate_writer
  context:
    - score_company_fit_task
